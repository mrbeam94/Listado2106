<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Asistencia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: #f0f2f5; min-height: 100vh; }
    #pinScreen { position: fixed; inset: 0; background: #1a73e8; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .pin-card { background: white; border-radius: 16px; padding: 36px 32px; text-align: center; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .pin-card h2 { font-size: 1.2rem; color: #212121; margin-bottom: 6px; }
    .pin-card p  { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
    .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
    .pin-dot  { width: 14px; height: 14px; border-radius: 50%; background: #e0e0e0; transition: background .2s; }
    .pin-dot.filled { background: #1a73e8; }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-btn  { background: #f5f5f5; border: none; border-radius: 10px; padding: 16px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: background .15s; color: #212121; }
    .pin-btn:hover  { background: #e8eaf6; }
    .pin-btn:active { background: #c5cae9; }
    .pin-btn.zero { grid-column: 2; }
    .pin-btn.del  { background: none; color: #888; font-size: 1rem; }
    .pin-error { color: #c62828; font-size: .82rem; margin-top: 12px; min-height: 18px; }
    .app { max-width: 100%; margin: 0; padding: 0; }
    header { background: #1a73e8; color: white; padding: 16px 24px; border-radius: 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    header h1  { font-size: 1.2rem; font-weight: 600; }
    header .fecha { font-size: .85rem; opacity: .85; }
    .edificio-tabs { background: white; display: flex; gap: 4px; padding: 10px 16px; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
    .ed-btn { padding: 6px 16px; border: 2px solid #e0e0e0; border-radius: 20px; background: white; cursor: pointer; font-weight: 600; font-size: .85rem; color: #666; transition: all .15s; white-space: nowrap; }
    .ed-btn.active { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }
    .salon-tabs { background: white; display: flex; gap: 4px; padding: 8px 16px; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
    .salon-btn { padding: 5px 14px; border: 1px solid #e0e0e0; border-radius: 16px; background: white; cursor: pointer; font-size: .82rem; color: #666; transition: all .15s; white-space: nowrap; }
    .salon-btn.active { border-color: #1a73e8; background: #1a73e8; color: white; }
    .stats-bar { background: white; padding: 10px 20px; display: flex; gap: 20px; border-bottom: 1px solid #e0e0e0; }
    .stat .num   { font-size: 1.4rem; font-weight: 700; color: #1a73e8; }
    .stat .label { font-size: .7rem; color: #666; text-transform: uppercase; letter-spacing: .5px; }
    .search-bar { background: white; padding: 10px 16px; border-bottom: 1px solid #e0e0e0; }
    .search-bar input { width: 100%; padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; outline: none; }
    .search-bar input:focus { border-color: #1a73e8; }
    .list-container { background: white; border-radius: 0; overflow: hidden; }
    .participant-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; gap: 12px; transition: background .15s; }
    .participant-row:last-child { border-bottom: none; }
    .participant-row:hover   { background: #f8f9ff; }
    .participant-row.presente { background: #e8f5e9; }
    .participant-row.presente:hover { background: #dcedc8; }
    .num-badge { width: 24px; height: 24px; background: #e8eaf6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 600; color: #3949ab; flex-shrink: 0; }
    .participant-info { flex: 1; min-width: 0; }
    .participant-info .nombre { font-size: .9rem; font-weight: 500; color: #212121; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .participant-info .username { font-size: .75rem; color: #888; }
    .hora-tag { font-size: .78rem; color: #2e7d32; font-weight: 600; min-width: 64px; text-align: right; }
    .checkbox-wrap { position: relative; width: 26px; height: 26px; flex-shrink: 0; }
    .checkbox-wrap input[type="checkbox"] { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; margin: 0; z-index: 1; }
    .checkbox-wrap .checkmark { position: absolute; top: 0; left: 0; width: 26px; height: 26px; border: 2px solid #ccc; border-radius: 6px; background: white; transition: all .2s; display: flex; align-items: center; justify-content: center; }
    .checkbox-wrap input:checked ~ .checkmark { background: #1a73e8; border-color: #1a73e8; }
    .checkbox-wrap .checkmark::after { content: ""; display: none; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
    .checkbox-wrap input:checked ~ .checkmark::after { display: block; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #323232; color: white; padding: 10px 20px; border-radius: 8px; font-size: .88rem; transition: transform .3s; z-index: 999; white-space: nowrap; }
    #toast.show    { transform: translateX(-50%) translateY(0); }
    #toast.success { background: #2e7d32; }
    #toast.error   { background: #c62828; }
    @media (max-width: 500px) { body { padding: 0; } .app { padding: 0; } .participant-row { padding: 8px 12px; } }
  </style>
</head>

</div>

  var EDIFICIOS = {};
  Object.keys(SALONES).sort().forEach(function(s) {
    var ed = s[0];
    if (!EDIFICIOS[ed]) EDIFICIOS[ed] = [];
    EDIFICIOS[ed].push(s);
  });

  var estado = {};
  Object.keys(SALONES).forEach(function(s) {
    estado[s] = {};
    SALONES[s].forEach(function(_, i) { estado[s][i] = { presente: false, hora: '' }; });
  });

  var salonActual    = Object.keys(SALONES)[0];
  var edificioActual = salonActual[0];

  document.getElementById('fechaHoy').textContent = new Date().toLocaleDateString('es-PE', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  if (SESSION_TOKEN) {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('appContent').style.display = '';
    renderEdificios();
    cargarDesdeSheets();
  }

  function renderEdificios() {
    var cont = document.getElementById('edificioTabs');
    cont.innerHTML = '';
    Object.keys(EDIFICIOS).sort().forEach(function(ed) {
      var btn = document.createElement('button');
      btn.className = 'ed-btn' + (ed === edificioActual ? ' active' : '');
      btn.textContent = 'Edificio ' + ed;
      btn.onclick = function() { seleccionarEdificio(ed); };
      cont.appendChild(btn);
    });
    renderSalones();
  }

  function renderSalones() {
    var cont = document.getElementById('salonTabs');
    cont.innerHTML = '';
    (EDIFICIOS[edificioActual] || []).forEach(function(s) {
      var btn = document.createElement('button');
      btn.className = 'salon-btn' + (s === salonActual ? ' active' : '');
      btn.textContent = s;
      btn.onclick = function() { seleccionarSalon(s); };
      cont.appendChild(btn);
    });
    renderLista();
  }

  function seleccionarEdificio(ed) {
    edificioActual = ed;
    salonActual = EDIFICIOS[ed][0];
    document.querySelectorAll('.ed-btn').forEach(function(b) { b.classList.toggle('active', b.textContent === 'Edificio ' + ed); });
    renderSalones();
  }

  function seleccionarSalon(s) {
    salonActual = s;
    document.querySelectorAll('.salon-btn').forEach(function(b) { b.classList.toggle('active', b.textContent === s); });
    renderLista();
  }

  function renderLista(filtro) {
    var contenedor = document.getElementById('listaParticipantes');
    contenedor.innerHTML = '';
    var participantes = SALONES[salonActual] || [];
    participantes.forEach(function(p, i) {
      if (filtro && p.nombre.toLowerCase().indexOf(filtro.toLowerCase()) === -1 &&
          (p.username || '').toLowerCase().indexOf(filtro.toLowerCase()) === -1) return;
      var e = estado[salonActual][i];
      var row = document.createElement('div');
      row.className = 'participant-row' + (e.presente ? ' presente' : '');
      row.dataset.index = i;
      row.innerHTML =
        '<div class="num-badge">' + (i + 1) + '</div>' +
        '<div class="participant-info">' +
          '<div class="nombre">' + p.nombre + '</div>' +
          '<div class="username">' + (p.username || '') + ' <span style="color:#bbb;margin:0 3px">|</span> ' + (p.codigo || '') + '</div>' +
        '</div>' +
        '<div class="hora-tag" id="hora-' + i + '">' + (e.hora || '') + '</div>' +
        '<label class="checkbox-wrap">' +
          '<input type="checkbox" ' + (e.presente ? 'checked' : '') + ' onchange="toggleAsistencia(' + i + ', this)">' +
          '<span class="checkmark"></span>' +
        '</label>';
      contenedor.appendChild(row);
    });
    actualizarStats();
  }

  function actualizarStats() {
    var est = Object.values(estado[salonActual] || {});
    var presentes = est.filter(function(e) { return e.presente; }).length;
    document.getElementById('totalPresentes').textContent     = presentes;
    document.getElementById('totalAusentes').textContent      = est.length - presentes;
    document.getElementById('totalParticipantes').textContent = est.length;
  }

  function filtrar(val) { renderLista(val); }

  function toggleAsistencia(index, checkbox) {
    var p        = SALONES[salonActual][index];
    var presente = checkbox.checked;
    var ahora    = presente ? new Date().toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
    var fecha    = new Date().toLocaleDateString('es-PE');
    estado[salonActual][index].presente = presente;
    estado[salonActual][index].hora     = ahora;
    var row = checkbox.closest('.participant-row');
    row.classList.toggle('presente', presente);
    document.getElementById('hora-' + index).textContent = ahora;
    actualizarStats();
    guardarEnSheets(p.nombre, p.username, presente, ahora, fecha);
  }

  function guardarEnSheets(nombre, username, presente, hora, fecha) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ accion: 'guardarAsistencia', token: SESSION_TOKEN, nombre: nombre, username: username, presente: presente, hora: hora, fecha: fecha, salon: salonActual })
    });
    mostrarToast((presente ? 'Marcado: ' : 'Desmarcado: ') + nombre, presente ? 'success' : '');
  }

  function cargarDesdeSheets() {
    fetch(APPS_SCRIPT_URL + '?token=' + SESSION_TOKEN + '&salon=' + salonActual, { redirect: 'follow' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.ok) return;
        data.data.forEach(function(item) {
          var participantes = SALONES[salonActual];
          var idx = -1;
          for (var j = 0; j < participantes.length; j++) {
            if (participantes[j].nombre.toLowerCase().replace(/[\s_]+/g,' ').trim() ===
                item.nombre.toLowerCase().replace(/[\s_]+/g,' ').trim()) { idx = j; break; }
          }
          if (idx >= 0) {
            estado[salonActual][idx].presente = item.presente;
            estado[salonActual][idx].hora     = item.hora || '';
          }
        });
        renderLista();
      })
      .catch(function() {});
  }

  var pinActual = '';

  function pinPress(digit) {
    if (pinActual.length >= 4) return;
    pinActual += digit;
    document.getElementById('d' + (pinActual.length - 1)).classList.add('filled');
    if (pinActual.length === 4) setTimeout(validarPin, 150);
  }

  function pinDel() {
    if (!pinActual.length) return;
    document.getElementById('d' + (pinActual.length - 1)).classList.remove('filled');
    pinActual = pinActual.slice(0, -1);
  }

  function validarPin() {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ accion: 'validarPin', pin: pinActual })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        SESSION_TOKEN = data.token;
        sessionStorage.setItem('asistenciaToken', SESSION_TOKEN);
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('appContent').style.display = '';
        renderEdificios();
        cargarDesdeSheets();
      } else {
        document.getElementById('pinError').textContent = 'PIN incorrecto';
        pinActual = '';
        document.querySelectorAll('.pin-dot').forEach(function(d) { d.classList.remove('filled'); });
        setTimeout(function() { document.getElementById('pinError').textContent = ''; }, 2000);
      }
    })
    .catch(function() {
      document.getElementById('pinError').textContent = 'Error de conexion';
      pinActual = '';
      document.querySelectorAll('.pin-dot').forEach(function(d) { d.classList.remove('filled'); });
    });
  }

  function mostrarToast(msg, tipo) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (tipo ? ' ' + tipo : '');
    setTimeout(function() { t.className = ''; }, 3000);
  }
</script>
